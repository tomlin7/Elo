syntax = "proto3";

package elo.v3;

enum MatchState {
  MATCH_STATE_UNSPECIFIED = 0;
  MATCH_STATE_COUNTDOWN = 1;
  MATCH_STATE_ACTIVE = 2;
  MATCH_STATE_PAUSED_DISCONNECT = 3;
  MATCH_STATE_FINISHED = 4;
}

enum RoomType {
  ROOM_TYPE_RANKED = 0;
  ROOM_TYPE_PRIVATE = 1;
  ROOM_TYPE_TOURNAMENT = 2;
}

enum TournamentRound {
  ROUND_UNSPECIFIED = 0;
  ROUND_QUARTERFINALS = 1;
  ROUND_SEMIFINALS = 2;
  ROUND_FINALS = 3;
}

enum MatchNodeStatus {
  STATUS_PENDING = 0;
  STATUS_IN_PROGRESS = 1;
  STATUS_COMPLETED = 2;
}

enum RegionZone {
  REGION_ZONE_UNSPECIFIED = 0;
  REGION_ZONE_APAC_SOUTH = 1;
  REGION_ZONE_EU_CENTRAL = 2;
  REGION_ZONE_US_EAST = 3;
  REGION_ZONE_ME_CENTRAL = 4;
}

message PlayerIdentity {
  string player_id = 1;
  string username = 2;
  int32 elo_rating = 3;
  string selected_theme_id = 4;
  string active_title = 5;
  int32 level = 6;
  int32 xp = 7;
}

message CreateCustomRoomRequest {
  string host_player_id = 1;
  bool allow_division = 2;
  bool allow_multiplication = 3;
  int32 custom_duration_seconds = 4;
}

message MatchSecurityLog {
  string action_sequence_id = 1;
  int64 keystroke_delta_ms = 2;
  string input_value = 3;
}

message TournamentNode {
  string node_id = 1;
  TournamentRound round_tier = 2;
  MatchNodeStatus status = 3;
  string player_one_id = 4;
  string player_two_id = 5;
  string winner_id = 6;
  string active_room_id = 7;
  string player_one_username = 8;
  string player_two_username = 9;
}

message TournamentBracketUpdate {
  string tournament_id = 1;
  repeated TournamentNode bracket_nodes = 2;
  int64 next_round_global_start_time = 3;
}

message SpectatorEmojiBurst {
  string room_id = 1;
  string emoji_type = 2;
  int32 execution_coordinate_x = 3;
}

message NetworkHandshake {
  string player_id = 1;
  string session_token = 2;
  string reconnection_token = 3;
  int64 last_received_server_tick = 4;
}

message OperationTelemetry {
  string operation_type = 1; // e.g., "DIVISION", "MULTIPLICATION", "ADD_SUB"
  int32 total_presented = 2;
  int32 total_correct = 3;
  int64 average_solve_time_ms = 4;
}

message HistoricalMatchSummary {
  string match_id = 1;
  string opponent_username = 2;
  bool is_victory = 3;
  int32 elo_delta = 4;
  int64 match_timestamp = 5;
  repeated OperationTelemetry stats = 6;
}

message RegionalHandshakeOverride {
  string room_id = 1;
  RegionZone assigned_zone = 2;
  string target_node_ip = 3;
  int64 sync_timestamp = 4;
}

message GameSessionSnapshot {
  string room_id = 1;
  int32 current_tick = 2;
  string question_stream_seed = 3;
  
  message PlayerStateBackup {
    string player_id = 1;
    int32 current_score = 2;
    int32 current_streak = 3;
  }
  
  PlayerStateBackup player_one = 4;
  PlayerStateBackup player_two = 5;
}

message ClientAction {
  string room_id = 1;
  string player_id = 2;
  int64 timestamp = 3;
  
  oneof payload {
    string current_input = 4;
    string submitted_answer = 5;
    string join_queue_player_id = 6;
    CreateCustomRoomRequest create_custom_room = 7;
    string join_private_room_code = 8;
    MatchSecurityLog security_log = 9;
    
    // Phase 3 & 4 Extensions
    string join_tournament_player_id = 10;
    string spectate_room_id = 11;
    SpectatorEmojiBurst emoji_burst = 12;
    NetworkHandshake connection_handshake = 13;
    
    // Phase 5 Extensions
    RegionalHandshakeOverride regional_override = 14;
  }
}

message ServerGameStateUpdate {
  string room_id = 1;
  MatchState state = 2;
  int32 time_remaining_seconds = 3;
  RoomType room_type = 4;
  string private_room_code = 5;
  
  message PlayerProgress {
    string player_id = 1;
    string username = 2;
    int32 current_score = 3;
    int32 current_streak = 4;
    string ghost_input = 5;
    int32 elo = 6;
    string active_title = 7;
    int32 level = 8;
  }
  
  PlayerProgress player_one = 6;
  PlayerProgress player_two = 7;
  
  string next_question_text = 8;
  string winner_id = 9;
  int32 player_one_elo_change = 10;
  int32 player_two_elo_change = 11;
  int32 player_one_xp_change = 12;
  int32 player_two_xp_change = 13;
  
  // Phase 3 & 4 Extensions
  TournamentBracketUpdate bracket_update = 14;
  SpectatorEmojiBurst emoji_burst = 15;
  string active_reconnection_token = 16;
  
  // Phase 5 Extensions
  RegionZone current_node_zone = 17;
  RegionalHandshakeOverride standby_override = 18;
}
